name: CI — Tests
on:
  push: { branches: [develop, staging, main] }
  pull_request: { branches: [staging, main] }
jobs:
  test:
    name: Pytest — backend
    runs-on: ubuntu-latest
    env: { RHADIX_ENV: test }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip, cache-dependency-path: backend/requirements-dev.txt }
      - name: Installeer dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt
      - name: Voer tests uit
        working-directory: backend
        run: pytest tests/ --tb=short -v
  build-check:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with: { context: ./backend, push: false, tags: "crm-backend:ci", cache-from: "type=gha,scope=backend", cache-to: "type=gha,scope=backend,mode=max" }
      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          build-args: |
            VITE_RHADIX_ENV=ci
          tags: "crm-frontend:ci"
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

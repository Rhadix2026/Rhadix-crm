name: Deploy — Staging
on:
  push: { branches: [staging] }
env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE:  ghcr.io/rhadix2026/crm-backend
  FRONTEND_IMAGE: ghcr.io/rhadix2026/crm-frontend
jobs:
  test:
    runs-on: ubuntu-latest
    env: { RHADIX_ENV: test }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip, cache-dependency-path: backend/requirements-dev.txt }
      - run: pip install -r requirements-dev.txt
        working-directory: backend
      - run: pytest tests/ --tb=short -v
        working-directory: backend
  build:
    runs-on: ubuntu-latest
    needs: test
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with: { registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }
      - uses: docker/build-push-action@v5
        with: { context: ./backend, push: true, tags: "${{ env.BACKEND_IMAGE }}:staging", cache-from: "type=gha,scope=backend", cache-to: "type=gha,scope=backend,mode=max" }
      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_RHADIX_ENV=staging
          tags: ${{ env.FRONTEND_IMAGE }}:staging
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Kopieer compose naar server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          source: docker-compose.staging.yml
          target: /opt/crm-app/
      - name: Schrijf .env.staging en deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cat > /opt/crm-app/.env.staging << 'ENVEOF'
            GHCR_ORG=rhadix2026
            STAGING_DB_USER=crm_staging
            STAGING_DB_NAME=crm_staging
            STAGING_FRONTEND_PORT=5183
            STAGING_BACKEND_PORT=8019
            STAGING_ADMIN_EMAIL=admin@rhadix.nl
            CENTRAL_JWT_ISSUER=suresync-id
            ENVEOF
            echo "STAGING_DB_PASSWORD=${{ secrets.STAGING_DB_PASSWORD }}"               >> /opt/crm-app/.env.staging
            echo "STAGING_JWT_SECRET_KEY=${{ secrets.STAGING_JWT_SECRET_KEY }}"         >> /opt/crm-app/.env.staging
            echo "STAGING_ADMIN_PASSWORD=${{ secrets.STAGING_ADMIN_PASSWORD }}"         >> /opt/crm-app/.env.staging
            echo "STAGING_CENTRAL_JWT_PUBLIC_KEY=${{ secrets.STAGING_CENTRAL_JWT_PUBLIC_KEY }}" >> /opt/crm-app/.env.staging
            chmod 600 /opt/crm-app/.env.staging
            if [ -f /opt/crm-app/mail.env ]; then
              cat /opt/crm-app/mail.env >> /opt/crm-app/.env.staging
              echo "mail.env toegevoegd aan .env.staging"
            fi
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            COMPOSE="docker compose -p crm-staging -f /opt/crm-app/docker-compose.staging.yml --env-file /opt/crm-app/.env.staging"
            $COMPOSE pull
            $COMPOSE up -d --remove-orphans
            $COMPOSE ps
      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            for i in $(seq 1 18); do
              S=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8019/api/health || echo 000)
              [ "$S" = "200" ] && { echo "✓ staging ok"; exit 0; }
              echo "poging $i/18 — HTTP $S"; sleep 5
            done
            docker logs crm-staging-backend --tail 30 || true; exit 1
